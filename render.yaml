services:
  - type: web
    name: nextleap-fastapi
    env: python
    plan: free
    # `data/` is .gitignore'd — build creates `data/restaurants.db` from HuggingFace so
    # /locations and /recommend have real Bangalore areas (not an empty table).
    buildCommand: |
      set -e
      pip install -r requirements.txt
      export HF_HOME="${HF_HOME:-$PWD/.hf_cache}"
      export HF_HUB_CACHE="${HF_HUB_CACHE:-$HF_HOME/hub}"
      export HF_DATASETS_CACHE="${HF_DATASETS_CACHE:-$HF_HOME/datasets}"
      python -m phase1.ingest
    startCommand: uvicorn phase4.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
